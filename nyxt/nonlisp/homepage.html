<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>replit</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <h1>[^._.^]ﾉ彡</h1>
  <h2 id="timer">00:00</h2>
  <div id="shortcut_container">
    <div id="shortcut_grid">
      <button id="A" class="shortcut">
        󰑴
      </button>
      <button id="B" class="shortcut">
        󰙯
      </button>
      <button id="C" class="shortcut">
        
      </button>
      <button id="D" class="shortcut">
        
      </button>
    </div>
  </div>
</body>

<style>
  :root {
    font-family: "helvetica";
  }

  body {
    background-color: #11111b;
    color: #f5c2e7;
  }

  h1 {
    margin-top: 10%;
    text-align: center;
  }

  h2 {
    text-align: center;
  }

  button {
    all: unset;
  }

  #shortcut_container {
    display: flex;
    justify-content: center;
    width: 100%;
  }

  #shortcut_grid {
    width: 40%;
    max-width: 300px;
    aspect-ratio: 1 / 1;

    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 20px 20px;

    margin-top: 10px;
  }

  .shortcut {
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 50px;
    background-color: #181825;
    border-radius: 10px;
    transition: 0.75s;
  }

  #A {
    color: #a6e3a1;
  }

  #A:hover {
    background-color: #a6e3a1;
    color: #181825;
  }

  #B {
    color: #cba6f7;
  }

  #B:hover {
    background-color: #cba6f7;
    color: #181825;
  }

  #C {
    color: #fab387;
  }

  #C:hover {
    background-color: #fab387;
    color: #181825;
  }

  #D {
    color: #f38ba8;
  }

  #D:hover {
    background-color: #f38ba8;
    color: #181825;
  }
</style>

<script>
  A.addEventListener("click", (e) => {
    window.open("https://fuhsd.schoology.com/", "_self")
  })
  B.addEventListener("click", (e) => {
    window.open("https://discord.com/channels/@me/", "_self")
  })
  C.addEventListener("click", (e) => {
    window.open("https://news.ycombinator.com/", "_self")
  })
  D.addEventListener("click", (e) => {
    window.open("https://www.youtube.com/", "_self")
  })

  function updateTime() {
    let date = new Date();
    document.getElementById("timer").textContent = date.getHours() + ":" + date.getMinutes();
    setTimeout(updateTime, 1000);
  }
  updateTime();
</script>

</html>
